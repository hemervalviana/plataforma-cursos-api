name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:

  # ======================================================
  # Build e Testes
  # ======================================================
  build-and-test:
    name: Build e Testes
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: Test@123456
          MSSQL_PID: Express
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Test@123456 -Q 'SELECT 1' -N -C"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Testes
        run: dotnet test --no-build -c Release --verbosity normal
        env:
          # Banco de teste usado pela ApiFactory
          ConnectionStrings__Default: >
            Server=127.0.0.1,1433;Database=PlataformaCursosDb_Test;
            User Id=sa;Password=Test@123456;
            TrustServerCertificate=True

      - name: Publicar artefato
        if: github.ref == 'refs/heads/main'
        run: dotnet publish PlataformaCursos.API -c Release -o ./publish

      - name: Upload artefato
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: plataforma-cursos-api
          path: ./publish

  # ======================================================
  # Build e Push da imagem Docker (só na main)
  # ======================================================
  docker:
    name: Docker Build e Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/plataforma-cursos-api:latest
            ${{ secrets.DOCKER_USERNAME }}/plataforma-cursos-api:${{ github.sha }}

      - name: Smoke test
        run: |
          docker run -d \
            --name smoke \
            -e ConnectionStrings__Default="Server=127.0.0.1;Database=smoke;User Id=sa;Password=placeholder;TrustServerCertificate=True" \
            -e Jwt__Key="chave-secreta-para-testes-deve-ter-32-chars!!" \
            -e Jwt__Issuer="PlataformaCursosAPI" \
            -e Jwt__Audience="PlataformaCursosClient" \
            -p 8080:8080 \
            ${{ secrets.DOCKER_USERNAME }}/plataforma-cursos-api:latest

          sleep 5

          curl --fail http://localhost:8080/health || exit 1

          docker stop smoke