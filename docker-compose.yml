services:

  # ======================================================
  # SQL Server
  # ======================================================
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: plataforma-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${DB_PASSWORD}
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql   # dados persistentes
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost",
             "-U", "sa",
             "-P", "${DB_PASSWORD}",
             "-Q", "SELECT 1",
             "-N", "-C"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - plataforma-net

  # ======================================================
  # API
  # ======================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plataforma-api
    environment:
      ConnectionStrings__Default: >
        Server=db;Database=PlataformaCursosDb;
        User Id=sa;Password=${DB_PASSWORD};
        TrustServerCertificate=True
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy   # aguarda o banco estar pronto
    networks:
      - plataforma-net

volumes:
  sqlserver_data:

networks:
  plataforma-net:
    driver: bridge